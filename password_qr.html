<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Locker Password - QR Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#1a1a1a;min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;width:100%;max-width:430px;
      box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden}
    .hdr{padding:22px 28px 0;text-align:center;border-bottom:1px solid #f0f0f0}
    .vrow{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:3px}
    .vbrand{font-size:22px;font-weight:900;color:#000;letter-spacing:-.5px}
    .vtag{font-size:12px;color:#888;margin-bottom:14px}
    .body{padding:24px 28px 28px}

    /* step badges */
    .step{display:flex;align-items:flex-start;gap:10px;margin-bottom:14px}
    .badge{background:#CD040B;color:#fff;border-radius:50%;width:22px;height:22px;
      font-size:11px;font-weight:800;display:flex;align-items:center;
      justify-content:center;flex-shrink:0;margin-top:1px}
    .step-body{flex:1}
    .step-title{font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:4px}
    .step-desc{font-size:12px;color:#888;line-height:1.6}
    .step-desc a{color:#CD040B;font-weight:600;text-decoration:none}
    .step-desc a:hover{text-decoration:underline}

    hr{border:none;border-top:1px solid #f0f0f0;margin:14px 0}

    .lbl{font-size:11px;font-weight:700;color:#CD040B;text-transform:uppercase;
      letter-spacing:.8px;margin-bottom:5px;margin-top:12px;display:block}
    .lbl:first-child{margin-top:0}
    .ig{position:relative}
    input[type=text],input[type=password],input[type=url]{width:100%;
      padding:11px 40px 11px 12px;border:2px solid #e5e5e5;border-radius:9px;
      font-size:14px;outline:none;transition:border .2s;color:#1a1a1a;margin-bottom:3px}
    input[type=url]{padding-right:12px}
    input:focus{border-color:#CD040B}
    .eye{position:absolute;right:11px;top:12px;cursor:pointer;font-size:15px;color:#bbb}
    .url-ok{font-size:12px;font-weight:600;margin-bottom:4px;min-height:16px}
    .url-ok.good{color:#16a34a}
    .url-ok.bad{color:#CD040B}

    .btn{width:100%;padding:13px;background:#CD040B;color:#fff;border:none;
      border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-top:16px;
      transition:background .2s}
    .btn:hover{background:#a50309}
    .errmsg{display:none;margin-top:8px;color:#CD040B;font-size:12px;font-weight:600;
      background:#fff5f5;border:1px solid #fcc;border-radius:7px;padding:9px}
    .errmsg.show{display:block}

    /* output */
    .out{display:none;margin-top:20px;text-align:center}
    .out.show{display:block}
    #qrcode{display:none}
    #fc{border-radius:10px;max-width:100%}
    .dlbtn{width:100%;padding:10px;background:#111;color:#fff;border:none;
      border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;margin-top:10px}
    .dlbtn:hover{background:#333}
    .done-note{margin-top:10px;font-size:12px;line-height:1.8;color:#1a1a1a;
      background:#f0fff4;border:1px solid #bbf7d0;border-radius:8px;padding:12px 14px;text-align:left}
    .done-note strong{color:#16a34a}
  </style>
</head>
<body>
<div class="card">
  <div class="hdr">
    <div class="vrow">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path d="M12 2L4 5.5V11c0 5.25 3.75 10.15 8 11.35C16.25 21.15 20 16.25 20 11V5.5L12 2z" fill="#CD040B"/>
        <rect x="9.5" y="11" width="5" height="4.5" rx="1" fill="white"/>
        <path d="M10 11V9.5a2 2 0 014 0V11" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      </svg>
      <span class="vbrand">Locker Password</span>
    </div>
    <p class="vtag">QR Generator</p>
  </div>

  <div class="body">

    <input type="hidden" id="hostUrl" value="https://SecurityScanCode.github.io"/>

    <!-- STEP 1 -->
    <div class="step">
      <div class="badge">1</div>
      <div class="step-body">
        <div class="step-title">Enter your password details</div>
      </div>
    </div>

    <label class="lbl">Password</label>
    <div class="ig">
      <input type="password" id="pwd" placeholder="Enter your password"/>
      <span class="eye" onclick="tog('pwd')">&#128065;</span>
    </div>

    <label class="lbl">Security Question</label>
    <input type="text" id="q" placeholder="e.g. What is your pet's name?"/>

    <label class="lbl">Answer</label>
    <div class="ig">
      <input type="password" id="ans" placeholder="Your answer (case-sensitive)"/>
      <span class="eye" onclick="tog('ans')">&#128065;</span>
    </div>

    <div class="errmsg" id="err"></div>
    <button class="btn" onclick="gen()">&#128273; Generate Secure QR Code</button>

    <!-- OUTPUT -->
    <div class="out" id="out">
      <div id="qrcode"></div>
      <canvas id="fc"></canvas>
      <button class="dlbtn" onclick="dl()">&#11015; Download QR Image</button>
      <div class="done-note">
        <strong>&#9989; Ready!</strong> Scan this QR with any iPhone or Android camera.<br>
        &rarr; Browser opens automatically<br>
        &rarr; Security question appears<br>
        &rarr; Answer correctly to reveal the password
      </div>
    </div>
  </div>
</div>

<script>
function tog(id){
  const e=document.getElementById(id);
  e.type=e.type==='password'?'text':'password';
}

function checkUrl(){
  const val=document.getElementById('hostUrl').value.trim();
  const el=document.getElementById('urlStatus');
  if(!val){el.textContent='';el.className='url-ok';return;}
  if(val.startsWith('https://')){
    el.textContent='✓ Looks good';el.className='url-ok good';
  } else {
    el.textContent='Must start with https://';el.className='url-ok bad';
  }
}

async function gen(){
  const hostUrl = document.getElementById('hostUrl').value.trim().replace(/\/+$/,'');
  const pwd     = document.getElementById('pwd').value.trim();
  const q       = document.getElementById('q').value.trim();
  const ans     = document.getElementById('ans').value.trim();
  const err     = document.getElementById('err');
  err.classList.remove('show');

  if(!hostUrl || !hostUrl.startsWith('https://')){
    err.textContent='Enter your GitHub Pages https:// URL first.';
    err.classList.add('show');return;
  }
  if(!pwd){err.textContent='Enter a password.';err.classList.add('show');return;}
  if(!q)  {err.textContent='Enter a security question.';err.classList.add('show');return;}
  if(!ans){err.textContent='Enter an answer.';err.classList.add('show');return;}

  // Encrypt password using AES-GCM (answer = key)
  const enc  = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const km   = await crypto.subtle.importKey('raw',enc.encode(ans),'PBKDF2',false,['deriveKey']);
  const key  = await crypto.subtle.deriveKey(
    {name:'PBKDF2',salt,iterations:100000,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['encrypt']
  );
  const encrypted = await crypto.subtle.encrypt({name:'AES-GCM',iv},key,enc.encode(pwd));

  const payload = {
    q:   q,
    s:   btoa(String.fromCharCode(...salt)),
    iv:  btoa(String.fromCharCode(...new Uint8Array(iv))),
    enc: btoa(String.fromCharCode(...new Uint8Array(encrypted)))
  };

  // QR points to https://SecurityScanCode.github.io/#encrypted-data
  // The # hash is NEVER sent to GitHub — stays on device only
  const qrUrl = `${hostUrl}/#${btoa(JSON.stringify(payload))}`;

  const box=document.getElementById('qrcode');
  box.innerHTML='';

  new QRCode(box,{
    text: qrUrl,
    width:280,height:280,
    colorDark:'#1a1a1a',
    colorLight:'#ffffff',
    correctLevel:QRCode.CorrectLevel.M
  });

  setTimeout(drawCanvas,200);
  document.getElementById('out').classList.add('show');
}

function drawCanvas(){
  const src=document.querySelector('#qrcode canvas');
  if(!src)return;
  const fc=document.getElementById('fc');
  fc.width=280;fc.height=306;
  const ctx=fc.getContext('2d');
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,280,306);
  ctx.drawImage(src,0,0,280,280);
  ctx.fillStyle='#CD040B';
  ctx.fillRect(0,280,280,26);
  ctx.fillStyle='#fff';
  ctx.font='bold 12px Segoe UI';
  ctx.textAlign='center';
  ctx.fillText('Locker Password — scan to unlock',140,295);
}

function dl(){
  const fc=document.getElementById('fc');
  if(!fc.width)return;
  const a=document.createElement('a');
  a.download='locker_password_qr.png';
  a.href=fc.toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
