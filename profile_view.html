<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Locker Password - Profile</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#1a1a1a;min-height:100vh;
      display:flex;align-items:center;justify-content:center;padding:20px}
    .card{background:#fff;border-radius:16px;width:100%;max-width:360px;
      box-shadow:0 8px 32px rgba(0,0,0,.5);overflow:hidden}

    /* header banner */
    .banner{background:#CD040B;padding:28px 20px 52px;text-align:center;position:relative}
    .brand{display:flex;align-items:center;justify-content:center;gap:7px;margin-bottom:4px}
    .brand-name{font-size:14px;font-weight:800;color:rgba(255,255,255,.85);letter-spacing:.5px}
    .banner-title{font-size:11px;color:rgba(255,255,255,.65);text-transform:uppercase;letter-spacing:.8px}

    /* avatar */
    .avatar-wrap{position:relative;text-align:center;margin-top:-44px;margin-bottom:10px}
    .avatar-initials{width:88px;height:88px;border-radius:50%;background:#1a1a1a;
      border:4px solid #fff;display:flex;align-items:center;justify-content:center;
      font-size:30px;font-weight:800;color:#fff;margin:0 auto;letter-spacing:1px}
    .avatar-img{width:88px;height:88px;border-radius:50%;object-fit:cover;
      border:4px solid #fff;display:block;margin:0 auto}

    /* body */
    .body{padding:0 24px 28px}
    .uname{font-size:20px;font-weight:800;color:#1a1a1a;text-align:center;margin-bottom:4px}
    .utag{font-size:12px;color:#aaa;text-align:center;margin-bottom:20px}

    /* detail rows */
    .section{margin-bottom:18px}
    .sec-label{font-size:10px;font-weight:800;color:#CD040B;text-transform:uppercase;
      letter-spacing:.8px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
    .sec-label::after{content:'';flex:1;height:1px;background:#f0f0f0}
    .row{display:flex;align-items:center;gap:12px;padding:10px 0;
      border-bottom:1px solid #f8f8f8}
    .row:last-child{border-bottom:none}
    .row-icon{width:32px;height:32px;border-radius:8px;background:#fff5f5;
      display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
    .row-body{flex:1;min-width:0}
    .row-label{font-size:10px;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px}
    .row-value{font-size:14px;font-weight:600;color:#1a1a1a;word-break:break-all}
    .row-value a{color:#1a1a1a;text-decoration:none}
    .row-value a:hover{color:#CD040B}
    .action-btn{width:28px;height:28px;border-radius:7px;background:#CD040B;color:#fff;
      border:none;font-size:14px;cursor:pointer;display:flex;align-items:center;
      justify-content:center;flex-shrink:0;text-decoration:none}
    .action-btn:hover{background:#a50309}

    /* error */
    .err-wrap{text-align:center;padding:30px 20px}
    .err-icon{font-size:40px;margin-bottom:12px}
    .err-title{font-size:16px;font-weight:700;color:#CD040B;margin-bottom:6px}
    .err-sub{font-size:13px;color:#888}

    /* loading */
    #loading{text-align:center;padding:40px 20px}
    .spin{font-size:32px;animation:spin 1s linear infinite;display:block;margin-bottom:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card" id="card">
  <div id="loading">
    <span class="spin">&#9881;</span>
    <p style="color:#888;font-size:14px">Loading profile...</p>
  </div>
</div>

<script>
window.onload = () => {
  const hash = window.location.hash.slice(1);
  if (!hash) { showError(); return; }

  let data;
  try {
    data = JSON.parse(decodeURIComponent(escape(atob(hash))));
    if (!data.name || !data.email) throw new Error();
  } catch {
    showError(); return;
  }

  const card = document.getElementById('card');

  const initials = data.name.trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0,2).join('');
  const avatarHtml = data.photo
    ? '<img class="avatar-img" src="' + esc(data.photo) + '" onerror="this.replaceWith(document.getElementById(\'init-fallback\'))"/><div id="init-fallback" class="avatar-initials" style="display:none">' + initials + '</div>'
    : '<div class="avatar-initials">' + initials + '</div>';

  const supSection = (data.sname || data.semail || data.sphone) ? `
    <div class="section">
      <div class="sec-label">Supervisor</div>
      ${data.sname  ? row('&#128084;', 'Name',  data.sname,  '') : ''}
      ${data.semail ? row('&#9993;',   'Email', data.semail, 'mailto:' + data.semail) : ''}
      ${data.sphone ? row('&#128222;', 'Phone', data.sphone, 'tel:' + data.sphone) : ''}
    </div>` : '';

  card.innerHTML = `
    <div class="banner">
      <div class="brand">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L4 5.5V11c0 5.25 3.75 10.15 8 11.35C16.25 21.15 20 16.25 20 11V5.5L12 2z" fill="rgba(255,255,255,0.9)"/>
          <rect x="9.5" y="11" width="5" height="4.5" rx="1" fill="#CD040B"/>
          <path d="M10 11V9.5a2 2 0 014 0V11" stroke="#CD040B" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </svg>
        <span class="brand-name">Locker Password</span>
      </div>
      <div class="banner-title">Profile Card</div>
    </div>

    <div class="avatar-wrap">${avatarHtml}</div>

    <div class="body">
      <div class="uname">${esc(data.name)}</div>
      <div class="utag">Verified Profile</div>

      <div class="section">
        <div class="sec-label">Contact</div>
        ${row('&#9993;',   'Email', data.email, 'mailto:' + data.email)}
        ${row('&#128222;', 'Phone', data.phone, 'tel:'    + data.phone)}
        ${data.location ? row('&#127970;', 'Work Location', data.location, '') : ''}
        ${data.desk     ? row('&#128203;', 'Desk Number',   data.desk,     '') : ''}
      </div>

      ${supSection}
    </div>
  `;
};

function row(icon, label, value, href) {
  const link = href
    ? '<a href="' + href + '">' + esc(value) + '</a>'
    : esc(value);
  const btn = href
    ? '<a class="action-btn" href="' + href + '">&#8599;</a>'
    : '';
  return `
    <div class="row">
      <div class="row-icon">${icon}</div>
      <div class="row-body">
        <div class="row-label">${label}</div>
        <div class="row-value">${link}</div>
      </div>
      ${btn}
    </div>`;
}

function esc(str) {
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function showError() {
  document.getElementById('card').innerHTML = `
    <div style="padding:24px 20px">
      <div class="err-wrap">
        <div class="err-icon">&#9888;</div>
        <div class="err-title">Invalid QR Code</div>
        <p class="err-sub">This page must be opened by scanning a Locker Password profile QR code.</p>
      </div>
    </div>`;
}
</script>
</body>
</html>
